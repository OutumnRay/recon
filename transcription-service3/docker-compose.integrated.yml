version: '3.8'

# This compose file is for integrating transcription-service3 with existing Recontext infrastructure
# Use this when you already have RabbitMQ, MinIO, and other services running

services:
  transcription-service3:
    build:
      context: .
      dockerfile: Dockerfile
    image: sivanov2018/recontext-transcription-service3:latest
    container_name: recontext-transcription-service3
    restart: unless-stopped

    # GPU support for NVIDIA GPUs
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    environment:
      # RabbitMQ Configuration - connect to existing infrastructure
      - RABBITMQ_HOST=${RABBITMQ_HOST:-192.168.5.153}
      - RABBITMQ_PORT=${RABBITMQ_PORT:-5672}
      - RABBITMQ_USER=${RABBITMQ_USER:-recontext}
      - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD:-je9rO4k6CQ3M}
      - RABBITMQ_QUEUE=${RABBITMQ_QUEUE:-transcription_queue}
      - RABBITMQ_RESULT_QUEUE=${RABBITMQ_RESULT_QUEUE:-transcription_results}

      # Whisper Configuration (large-v3 is pre-downloaded in image)
      - WHISPER_MODEL=${WHISPER_MODEL:-large-v3}
      - WHISPER_DEVICE=${WHISPER_DEVICE:-cuda}
      - WHISPER_COMPUTE_TYPE=${WHISPER_COMPUTE_TYPE:-float16}

      # Storage Configuration - connect to existing MinIO
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-192.168.5.153:9000}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-32a4953d5bff4a1c6aea4d4ccfb757e5}
      - MINIO_SECURE=${MINIO_SECURE:-false}
      - MINIO_BUCKET=${MINIO_BUCKET:-recontext}

    volumes:
      # Mount for model cache to avoid re-downloading
      - whisper-models:/root/.cache/huggingface
      # Optional: mount for logs
      - ./logs:/app/logs

    networks:
      - recontext-network

    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    # Health check
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      start-period: 60s
      retries: 3

volumes:
  whisper-models:
    driver: local

networks:
  recontext-network:
    external: true
