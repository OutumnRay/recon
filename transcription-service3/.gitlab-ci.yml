stages:
  - build
  - publish

variables:
  DOCKER_IMAGE: "sivanov2018/recontext-transcription-service3"
  DOCKER_DRIVER: overlay2
  # Disable TLS for private GitLab runners
  DOCKER_TLS_CERTDIR: ""

# Build job - builds the Docker image
build:
  stage: build
  image: docker:24-dind
  services:
    - docker:24-dind
  tags:
    - docker
  before_script:
    - docker info
  script:
    - echo "Building Docker image for transcription-service3..."
    - |
      # Determine version tag
      if [ -n "$CI_COMMIT_TAG" ]; then
        VERSION_TAG="$CI_COMMIT_TAG"
      else
        VERSION_TAG="$CI_COMMIT_SHORT_SHA"
      fi
    - echo "Version tag: $VERSION_TAG"

    # Build the image
    - docker build
        -t $DOCKER_IMAGE:$VERSION_TAG
        -t $DOCKER_IMAGE:$CI_COMMIT_REF_SLUG
        -f Dockerfile
        .

    # Save image to cache
    - docker save $DOCKER_IMAGE:$VERSION_TAG | gzip > transcription-service3.tar.gz
  artifacts:
    paths:
      - transcription-service3.tar.gz
    expire_in: 1 day
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_TAG =~ /^transcription-v.*/'
  timeout: 2h

# Publish job - pushes to Docker Hub
publish:
  stage: publish
  image: docker:24-dind
  services:
    - docker:24-dind
  tags:
    - docker
  dependencies:
    - build
  before_script:
    - docker info
    # Login to Docker Hub
    - echo "$DOCKER_HUB_PASSWORD" | docker login -u "$DOCKER_HUB_USERNAME" --password-stdin
  script:
    - echo "Publishing Docker image..."
    - |
      # Determine version tag
      if [ -n "$CI_COMMIT_TAG" ]; then
        VERSION_TAG="$CI_COMMIT_TAG"
      else
        VERSION_TAG="$CI_COMMIT_SHORT_SHA"
      fi

    # Load the image from cache
    - docker load < transcription-service3.tar.gz

    # Push versioned tag
    - docker push $DOCKER_IMAGE:$VERSION_TAG

    # Push branch-specific tag
    - docker push $DOCKER_IMAGE:$CI_COMMIT_REF_SLUG

    # Push latest tag only for main branch
    - |
      if [ "$CI_COMMIT_BRANCH" == "main" ]; then
        docker tag $DOCKER_IMAGE:$VERSION_TAG $DOCKER_IMAGE:latest
        docker push $DOCKER_IMAGE:latest
        echo "✅ Published: $DOCKER_IMAGE:latest"
      fi

    - echo "✅ Published: $DOCKER_IMAGE:$VERSION_TAG"
    - echo "✅ Published: $DOCKER_IMAGE:$CI_COMMIT_REF_SLUG"
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_TAG =~ /^transcription-v.*/'
  timeout: 30m

# Manual publish job for testing
publish:manual:
  stage: publish
  image: docker:24-dind
  services:
    - docker:24-dind
  tags:
    - docker
  dependencies:
    - build
  before_script:
    - docker info
    - echo "$DOCKER_HUB_PASSWORD" | docker login -u "$DOCKER_HUB_USERNAME" --password-stdin
  script:
    - echo "Manual publish triggered"
    - docker load < transcription-service3.tar.gz
    - docker tag $DOCKER_IMAGE:$CI_COMMIT_SHORT_SHA $DOCKER_IMAGE:test-$CI_COMMIT_SHORT_SHA
    - docker push $DOCKER_IMAGE:test-$CI_COMMIT_SHORT_SHA
    - echo "✅ Published: $DOCKER_IMAGE:test-$CI_COMMIT_SHORT_SHA"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: manual
    - when: manual
  timeout: 30m
