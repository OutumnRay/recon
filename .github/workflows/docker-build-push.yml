name: Build and Push Docker Images

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  DOCKER_USERNAME: raykzer
  DOCKER_REGISTRY: docker.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false  # Continue building other images even if one fails
      matrix:
        service:
          - name: managing-portal
            dockerfile: deployments/docker/Dockerfile.managing-portal
          - name: user-portal
            dockerfile: deployments/docker/Dockerfile.user-portal
#          - name: transcription-worker
#            dockerfile: deployments/docker/Dockerfile.transcription-worker
#          - name: summarization-worker
#            dockerfile: deployments/docker/Dockerfile.summarization-worker
#          - name: jitsi-agent
#            dockerfile: deployments/docker/Dockerfile.jitsi-agent

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_USERNAME }}/recontext-${{ matrix.service.name }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.service.dockerfile }}
          push: ${{ github.ref == 'refs/heads/main' && github.event_name == 'push' }}
          tags: |
            ${{ env.DOCKER_USERNAME }}/recontext-${{ matrix.service.name }}:latest
            ${{ env.DOCKER_USERNAME }}/recontext-${{ matrix.service.name }}:${{ github.sha }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.DOCKER_USERNAME }}/recontext-${{ matrix.service.name }}:buildcache
          cache-to: type=registry,ref=${{ env.DOCKER_USERNAME }}/recontext-${{ matrix.service.name }}:buildcache,mode=max
          build-args: |
            BUILDKIT_PROGRESS=plain

      - name: Build Summary
        if: always()
        run: |
          echo "### Build Result for ${{ matrix.service.name }}" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.build.outcome }}" == "success" ]; then
            echo "✅ Successfully built ${{ matrix.service.name }}" >> $GITHUB_STEP_SUMMARY
            echo "📦 Image: ${{ env.DOCKER_USERNAME }}/recontext-${{ matrix.service.name }}:latest" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Failed to build ${{ matrix.service.name }}" >> $GITHUB_STEP_SUMMARY
            echo "📄 Check the logs above for details" >> $GITHUB_STEP_SUMMARY
          fi

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && needs.build-and-push.result == 'success'
    steps:
      - name: Deploy to production server via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_SSH_PORT || 22 }}
          script: |
            bash /opt/recontext/scripts/deploy.sh

      - name: Deploy Summary
        run: |
          echo "## Deploy Result" >> $GITHUB_STEP_SUMMARY
          echo "✅ Deployed to production server" >> $GITHUB_STEP_SUMMARY
          echo "🖥️ Server: ${{ secrets.SERVER_HOST }}" >> $GITHUB_STEP_SUMMARY

  build-summary:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check build status
        run: |
          echo "## Docker Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.build-and-push.result }}" == "success" ]; then
            echo "✅ All Docker images built successfully!" >> $GITHUB_STEP_SUMMARY
            echo "✅ All Docker images built and pushed successfully"
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Services Built:" >> $GITHUB_STEP_SUMMARY
            echo "- managing-portal" >> $GITHUB_STEP_SUMMARY
            echo "- user-portal" >> $GITHUB_STEP_SUMMARY
            echo "- transcription-worker" >> $GITHUB_STEP_SUMMARY
            echo "- summarization-worker" >> $GITHUB_STEP_SUMMARY
            echo "- jitsi-agent" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Some Docker images failed to build" >> $GITHUB_STEP_SUMMARY
            echo "❌ Some Docker images failed to build"
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Check individual job logs for details on which service(s) failed." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Common Issues:" >> $GITHUB_STEP_SUMMARY
            echo "- Missing frontend directories (front/managing-portal, front/user-portal)" >> $GITHUB_STEP_SUMMARY
            echo "- Missing package.json in frontend directories" >> $GITHUB_STEP_SUMMARY
            echo "- Go module download failures" >> $GITHUB_STEP_SUMMARY
            echo "- Docker Hub authentication issues" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
