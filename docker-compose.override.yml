# Local development overrides — автоматически применяется поверх docker-compose.yml
# Что меняем:
#   - добавляем локальный PostgreSQL
#   - user-portal и managing-portal → локальные MinIO / Redis / Postgres
#   - MinIO credentials = minioadmin/minioadmin (локальный образ)

services:

  # Локальный PostgreSQL для разработки
  postgres:
    image: pgvector/pgvector:pg16
    container_name: recontext-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=recontext
      - POSTGRES_PASSWORD=recontext
      - POSTGRES_DB=recontext
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - recontext-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U recontext"]
      interval: 10s
      timeout: 5s
      retries: 5

  managing-portal:
    image: recontext-managing-portal:local
    environment:
      - DB_HOST=postgres
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  user-portal:
    image: recontext-user-portal:local
    environment:
      - DB_HOST=postgres
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  transcription-worker-py:
    environment:
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - REDIS_HOST=redis
      - REDIS_PORT=6379
