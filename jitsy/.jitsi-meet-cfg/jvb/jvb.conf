videobridge {
    cc {
        use-vla-target-bitrate = false
        trust-bwe = true
    }
    ice {
        udp {
            port = 10000
        }
        advertise-private-candidates = true
    }
    apis {
        xmpp-client {
            configs {
                shard0 {
                    HOSTNAME = "xmpp.meet.jitsi"
                    PORT = "5222"
                    DOMAIN = "auth.meet.jitsi"
                    USERNAME = "jvb"
                    PASSWORD = "7e64cc0a50a0a6ec83eb2458bc5d5e10"
                    MUC_JIDS = "jvbbrewery@internal-muc.meet.jitsi"
                    MUC_NICKNAME = "c79e49270645"
                    DISABLE_CERTIFICATE_VERIFICATION = true
                }
            }
        }
        rest {
            # ИСПРАВЛЕНО: Включаем REST API
            enabled = true
        }
    }
    # Дублирующийся блок `rest.shutdown` можно удалить или оставить, он не мешает
    # Но для чистоты лучше убрать, так как он уже внутри `apis`
    sctp {
      enabled = true
      use-usrsctp = false
    }
    stats {
        enabled = true
    }
    websockets {
        enabled = false
        domain = "meet.recontext.online"
        tls = true
        server-id = "172.18.0.5"
    }
    http-servers {
        private {
          host = 0.0.0.0
          send-server-version = false
        }
        public {
            host = 0.0.0.0
            port = 9090
            send-server-version = false
        }
    }
    health {
        require-valid-address = false
    }
}

jmt {
    bwe {
        estimator {
            engine = "GoogleCc2"
        }
    }
}

ice4j {
    harvest {
        mapping {
            aws {
                enabled = true
            }
            stun {
                addresses = [ "stun.l.google.com:19302","stun1.l.google.com:19302","5.129.227.21:3478" ]
            }
            static-mappings = [
                {
                    local-address = "172.18.0.5"
                    public-address = "185.233.186.144"
                    name = "ip-0"
                },
            ]
        }
    }
}

include "custom-jvb.conf"