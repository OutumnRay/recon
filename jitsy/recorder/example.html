<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jitsi Kurento Recorder - Demo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
        }

        .panel {
            background: white;
            border-radius: 10px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .panel h2 {
            margin-bottom: 20px;
            color: #333;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 500;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }

        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            flex: 1;
            min-width: 120px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
        }

        .btn-danger {
            background: #f56565;
            color: white;
        }

        .btn-danger:hover {
            background: #e53e3e;
        }

        .btn-success {
            background: #48bb78;
            color: white;
        }

        .btn-success:hover {
            background: #38a169;
        }

        .btn-info {
            background: #4299e1;
            color: white;
        }

        .btn-info:hover {
            background: #3182ce;
        }

        .log {
            background: #1a202c;
            color: #48bb78;
            padding: 20px;
            border-radius: 5px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            max-height: 400px;
            overflow-y: auto;
            margin-top: 20px;
        }

        .log-entry {
            margin-bottom: 5px;
            padding: 5px;
            border-left: 3px solid #667eea;
            padding-left: 10px;
        }

        .log-entry.error {
            color: #f56565;
            border-left-color: #f56565;
        }

        .log-entry.success {
            color: #48bb78;
            border-left-color: #48bb78;
        }

        .log-entry.info {
            color: #4299e1;
            border-left-color: #4299e1;
        }

        .status-badge {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
            margin-left: 10px;
        }

        .status-recording {
            background: #f56565;
            color: white;
            animation: pulse 2s infinite;
        }

        .status-stopped {
            background: #cbd5e0;
            color: #2d3748;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .recordings-list {
            margin-top: 20px;
        }

        .recording-item {
            background: #f7fafc;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 5px;
            border-left: 4px solid #667eea;
        }

        .recording-item strong {
            color: #667eea;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎥 Jitsi Kurento Recorder - Demo</h1>

        <!-- API Configuration -->
        <div class="panel">
            <h2>⚙️ Configuration</h2>
            <div class="form-group">
                <label for="api-url">Recorder API URL:</label>
                <input type="text" id="api-url" value="http://localhost:9888">
            </div>
        </div>

        <!-- Recording Controls -->
        <div class="panel">
            <h2>🎬 Recording Controls</h2>

            <div class="form-group">
                <label for="user-id">User ID:</label>
                <input type="text" id="user-id" placeholder="john_doe">
            </div>

            <div class="form-group">
                <label for="room-name">Room Name:</label>
                <input type="text" id="room-name" placeholder="testroom">
            </div>

            <div class="button-group">
                <button class="btn-primary" onclick="startRecording()">▶️ Start Recording</button>
                <button class="btn-danger" onclick="stopRecording()">⏹️ Stop Recording</button>
                <button class="btn-info" onclick="getStatus()">📊 Get Status</button>
            </div>
        </div>

        <!-- List & Batch Operations -->
        <div class="panel">
            <h2>📋 Batch Operations</h2>

            <div class="button-group">
                <button class="btn-success" onclick="listRecordings()">📝 List All Recordings</button>
                <button class="btn-danger" onclick="stopAll()">🛑 Stop All Recordings</button>
                <button class="btn-info" onclick="checkHealth()">❤️ Health Check</button>
            </div>

            <div id="recordings-list" class="recordings-list"></div>
        </div>

        <!-- Log Console -->
        <div class="panel">
            <h2>📜 Console Log</h2>
            <div id="log" class="log"></div>
        </div>
    </div>

    <script src="example-client.js"></script>
    <script>
        let recorder = null;

        // Initialize recorder on page load
        window.addEventListener('DOMContentLoaded', () => {
            const apiUrl = document.getElementById('api-url').value;
            recorder = new JitsiRecorderClient(apiUrl);
            log('Recorder initialized', 'info');
        });

        // Update recorder URL when changed
        document.getElementById('api-url').addEventListener('change', (e) => {
            recorder = new JitsiRecorderClient(e.target.value);
            log(`Recorder URL changed to: ${e.target.value}`, 'info');
        });

        // Helper function to log messages
        function log(message, type = 'info') {
            const logDiv = document.getElementById('log');
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logDiv.appendChild(entry);
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        // Start Recording
        async function startRecording() {
            const userId = document.getElementById('user-id').value;
            const roomName = document.getElementById('room-name').value;

            if (!userId || !roomName) {
                log('❌ Please enter User ID and Room Name', 'error');
                alert('Please enter User ID and Room Name');
                return;
            }

            try {
                log(`Starting recording for ${userId} in room ${roomName}...`, 'info');
                const result = await recorder.startRecording(userId, roomName);
                log(`✅ Recording started: ${JSON.stringify(result)}`, 'success');
                alert('Recording started! 🔴');
            } catch (error) {
                log(`❌ Error starting recording: ${error.message}`, 'error');
                alert('Failed to start recording: ' + error.message);
            }
        }

        // Stop Recording
        async function stopRecording() {
            const userId = document.getElementById('user-id').value;
            const roomName = document.getElementById('room-name').value;

            if (!userId || !roomName) {
                log('❌ Please enter User ID and Room Name', 'error');
                alert('Please enter User ID and Room Name');
                return;
            }

            try {
                log(`Stopping recording for ${userId} in room ${roomName}...`, 'info');
                const result = await recorder.stopRecording(userId, roomName);
                log(`✅ Recording stopped: ${JSON.stringify(result)}`, 'success');
                alert('Recording stopped! ⏹️');
            } catch (error) {
                log(`❌ Error stopping recording: ${error.message}`, 'error');
                alert('Failed to stop recording: ' + error.message);
            }
        }

        // Get Status
        async function getStatus() {
            const userId = document.getElementById('user-id').value;

            if (!userId) {
                log('❌ Please enter User ID', 'error');
                alert('Please enter User ID');
                return;
            }

            try {
                log(`Getting status for ${userId}...`, 'info');
                const status = await recorder.getStatus(userId);
                log(`📊 Status: ${JSON.stringify(status, null, 2)}`, 'info');

                if (status.status === 'not_found') {
                    alert('No active recording found for this user');
                } else {
                    alert(`Recording active!\nDuration: ${status.duration.toFixed(1)}s`);
                }
            } catch (error) {
                log(`❌ Error getting status: ${error.message}`, 'error');
                alert('Failed to get status: ' + error.message);
            }
        }

        // List All Recordings
        async function listRecordings() {
            try {
                log('Fetching list of recordings...', 'info');
                const result = await recorder.listRecordings();
                log(`📝 Active recordings: ${result.active_recordings}`, 'success');

                const listDiv = document.getElementById('recordings-list');
                listDiv.innerHTML = '';

                if (result.recordings.length === 0) {
                    listDiv.innerHTML = '<p style="color: #718096; text-align: center; padding: 20px;">No active recordings</p>';
                } else {
                    result.recordings.forEach(rec => {
                        const item = document.createElement('div');
                        item.className = 'recording-item';
                        item.innerHTML = `
                            <strong>User:</strong> ${rec.user}<br>
                            <strong>Started:</strong> ${new Date(rec.started_at).toLocaleString()}<br>
                            <strong>Duration:</strong> ${rec.duration.toFixed(1)}s<br>
                            <strong>File:</strong> ${rec.filepath}
                        `;
                        listDiv.appendChild(item);
                    });
                }
            } catch (error) {
                log(`❌ Error listing recordings: ${error.message}`, 'error');
                alert('Failed to list recordings: ' + error.message);
            }
        }

        // Stop All Recordings
        async function stopAll() {
            if (!confirm('Stop all active recordings?')) {
                return;
            }

            try {
                log('Stopping all recordings...', 'info');
                const result = await recorder.stopAll();
                log(`✅ Stopped ${result.count} recordings: ${result.users.join(', ')}`, 'success');
                alert(`Stopped ${result.count} recording(s)`);

                // Refresh list
                listRecordings();
            } catch (error) {
                log(`❌ Error stopping all: ${error.message}`, 'error');
                alert('Failed to stop all recordings: ' + error.message);
            }
        }

        // Health Check
        async function checkHealth() {
            try {
                log('Checking health...', 'info');
                const apiUrl = document.getElementById('api-url').value;
                const response = await fetch(`${apiUrl}/health`);
                const health = await response.json();

                log(`❤️ Health: ${JSON.stringify(health)}`, 'success');
                alert(`API is healthy!\nActive recordings: ${health.active_recordings}`);
            } catch (error) {
                log(`❌ Health check failed: ${error.message}`, 'error');
                alert('Health check failed: ' + error.message);
            }
        }
    </script>
</body>
</html>
