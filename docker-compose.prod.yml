version: '3.8'

services:
  # 1. Managing Portal - monitors and manages everything else
  managing-portal:
    image: sivanov2018/recontext-managing-portal:latest
    container_name: recontext-managing-portal
    ports:
      - "10080:8080"
    environment:
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8080
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=recontext
      - DB_PASSWORD=recontext
      - DB_NAME=recontext
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=guest
      - RABBITMQ_PASSWORD=guest
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_BUCKET=recontext
      - LIVEKIT_URL=wss://video.recontext.online
      - LIVEKIT_API_KEY=APIBj3yrXtyPRNq
      - LIVEKIT_API_SECRET=2Q66dFk7HWpxTuTneMT4fQlsxeIlmkn47ApjnJiSukiA
      # SMTP Configuration for email sending
      - SMTP_HOST=smtp.timeweb.ru
      - SMTP_PORT=465
      - SMTP_USER=support@recontext.online
      - SMTP_PASSWORD=hiwu9vdxe5
      - SMTP_FROM_ADDRESS=support@recontext.online
      - SMTP_FROM_NAME=Служба поддержки Recontext
    depends_on:
      - postgres
      - rabbitmq
      - minio
    networks:
      - recontext-network
    restart: unless-stopped

  # 2. User Portal - for interaction with the system
  user-portal:
    image: sivanov2018/recontext-user-portal:latest
    container_name: recontext-user-portal
    ports:
      - "10081:8081"
    environment:
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8081
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=recontext
      - DB_PASSWORD=recontext
      - DB_NAME=recontext
      - MANAGING_PORTAL_URL=http://managing-portal:8080
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_BUCKET=recontext
      # Embeddings configuration - supports both OpenAI and self-hosted models
      # For OpenAI (default):
      # - EMBEDDINGS_API_URL=https://api.openai.com/v1/embeddings
      # - EMBEDDINGS_API_KEY=your-openai-api-key
      # - EMBEDDINGS_MODEL=text-embedding-3-small
      # For self-hosted (Ollama example):
      - EMBEDDINGS_API_URL=http://ollama:11434/api/embeddings
      - EMBEDDINGS_API_KEY=local
      - EMBEDDINGS_MODEL=nomic-embed-text
      - LIVEKIT_URL=wss://video.recontext.online
      - LIVEKIT_API_KEY=APIBj3yrXtyPRNq
      - LIVEKIT_API_SECRET=2Q66dFk7HWpxTuTneMT4fQlsxeIlmkn47ApjnJiSukiA
      # SMTP Configuration for email sending
      - SMTP_HOST=smtp.timeweb.ru
      - SMTP_PORT=465
      - SMTP_USER=support@recontext.online
      - SMTP_PASSWORD=hiwu9vdxe5
      - SMTP_FROM_ADDRESS=support@recontext.online
      - SMTP_FROM_NAME=Служба поддержки Recontext
    depends_on:
      - managing-portal
      - postgres
      - minio
    #      - ollama
    networks:
      - recontext-network
    restart: unless-stopped

  # 3. RabbitMQ - Message Broker
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: recontext-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
      - "15692:15692"   # Prometheus metrics
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    command: >
      sh -c "rabbitmq-plugins enable --offline rabbitmq_prometheus rabbitmq_management &&
             rabbitmq-server"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - recontext-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5


  # 7. MinIO Storage
  minio:
    image: minio/minio:latest
    container_name: recontext-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
      - MINIO_PROMETHEUS_AUTH_TYPE=public
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    networks:
      - recontext-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # 8. PostgreSQL Database with pgvector extension
  postgres:
    image: pgvector/pgvector:pg16
    container_name: recontext-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=recontext
      - POSTGRES_PASSWORD=recontext
      - POSTGRES_DB=recontext
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - recontext-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U recontext"]
      interval: 10s
      timeout: 5s
      retries: 5


  watchtower:
    image: containrrr/watchtower:latest
    container_name: recontext-watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      # Check for updates every 5 minutes (300 seconds)
      - WATCHTOWER_POLL_INTERVAL=300
      # Remove old images after updating
      - WATCHTOWER_CLEANUP=true
      # Include stopped containers
      - WATCHTOWER_INCLUDE_STOPPED=true
      # Include restarting containers
      - WATCHTOWER_INCLUDE_RESTARTING=true
      # Enable debug logging
      - WATCHTOWER_DEBUG=false
      # Send notifications on updates (optional - configure as needed)
      # - WATCHTOWER_NOTIFICATIONS=shoutrrr
      # - WATCHTOWER_NOTIFICATION_URL=
      # Monitor only containers with label (optional)
      # - WATCHTOWER_LABEL_ENABLE=true
      # Rolling restart - update one container at a time (optional)
      # - WATCHTOWER_ROLLING_RESTART=true
    command:
      # Monitor specific containers (optional - remove to monitor all)
      # For now, monitor all Recontext custom services
      - recontext-managing-portal
      - recontext-user-portal
      - recontext-jitsi-agent
    networks:
      - recontext-network
    restart: unless-stopped

networks:
  recontext-network:
    driver: bridge

volumes:
  postgres-data:
  minio-data:
  rabbitmq-data:
  qdrant-data:
  jitsi-recordings:
  prometheus-data:
  grafana-data:
  ollama-data:
