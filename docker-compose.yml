services:
  # 1. Managing Portal - monitors and manages everything else
  managing-portal:
    build:
      context: .
      dockerfile: deployments/docker/Dockerfile.managing-portal
    image: sivanov2018/recontext-managing-portal:latest
    container_name: recontext-managing-portal
    ports:
      - "${MANAGING_PORTAL_PORT:-20080}:8080"
    environment:
      - APP_VERSION=${APP_VERSION:-0.1.0+0}
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8080
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER:-recontext}
      - DB_PASSWORD=${DB_PASSWORD:-recontext}
      - DB_NAME=${DB_NAME:-recontext}
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=${RABBITMQ_USER:-recontext}
      - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD:-recontext}
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
      - MINIO_BUCKET=${MINIO_BUCKET:-recontext}
      - LIVEKIT_URL=${LIVEKIT_URL:-}
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY:-}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET:-}
      - LIVEKIT_WEBHOOK_DEBUG=${LIVEKIT_WEBHOOK_DEBUG:-false}
      - DEBUG_LOGS_ENABLED=${DEBUG_LOGS_ENABLED:-false}
      # LiveKit Egress (Recording) Configuration
      - LIVEKIT_EGRESS_ENABLED=${LIVEKIT_EGRESS_ENABLED:-false}
      - LIVEKIT_EGRESS_S3_ENDPOINT=${LIVEKIT_EGRESS_S3_ENDPOINT:-}
      - LIVEKIT_EGRESS_S3_BUCKET=${LIVEKIT_EGRESS_S3_BUCKET:-recontext}
      - LIVEKIT_EGRESS_S3_ACCESS_KEY=${LIVEKIT_EGRESS_S3_ACCESS_KEY:-minioadmin}
      - LIVEKIT_EGRESS_S3_SECRET=${LIVEKIT_EGRESS_S3_SECRET:-minioadmin}
      - LIVEKIT_EGRESS_S3_REGION=${LIVEKIT_EGRESS_S3_REGION:-}
      - LIVEKIT_EGRESS_RECORD_TRACKS=${LIVEKIT_EGRESS_RECORD_TRACKS:-false}
      # SMTP Configuration for email sending
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM_ADDRESS=${SMTP_FROM_ADDRESS:-noreply@localhost}
      - SMTP_FROM_NAME=${SMTP_FROM_NAME:-Recontext}
      # Portal URL for generating anonymous join links
      - PORTAL_URL=${PORTAL_URL:-http://localhost:20081}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - recontext-network
    restart: unless-stopped

  # 2. User Portal - for interaction with the system
  user-portal:
    build:
      context: .
      dockerfile: deployments/docker/Dockerfile.user-portal
    image: sivanov2018/recontext-user-portal:latest
    container_name: recontext-user-portal
    ports:
      - "${USER_PORTAL_PORT:-20081}:8081"
    environment:
      - APP_VERSION=${APP_VERSION:-0.1.0+0}
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8081
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER:-recontext}
      - DB_PASSWORD=${DB_PASSWORD:-recontext}
      - DB_NAME=${DB_NAME:-recontext}
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=${RABBITMQ_USER:-recontext}
      - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD:-recontext}
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
      - MINIO_BUCKET=${MINIO_BUCKET:-recontext}
      - LIVEKIT_URL=${LIVEKIT_URL:-}
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY:-}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET:-}
      - LIVEKIT_WEBHOOK_DEBUG=${LIVEKIT_WEBHOOK_DEBUG:-false}
      - DEBUG_LOGS_ENABLED=${DEBUG_LOGS_ENABLED:-false}
      # LiveKit Egress (Recording) Configuration
      - LIVEKIT_EGRESS_ENABLED=${LIVEKIT_EGRESS_ENABLED:-false}
      - LIVEKIT_EGRESS_S3_ENDPOINT=${LIVEKIT_EGRESS_S3_ENDPOINT:-}
      - LIVEKIT_EGRESS_S3_BUCKET=${LIVEKIT_EGRESS_S3_BUCKET:-recontext}
      - LIVEKIT_EGRESS_S3_ACCESS_KEY=${LIVEKIT_EGRESS_S3_ACCESS_KEY:-minioadmin}
      - LIVEKIT_EGRESS_S3_SECRET=${LIVEKIT_EGRESS_S3_SECRET:-minioadmin}
      - LIVEKIT_EGRESS_S3_REGION=${LIVEKIT_EGRESS_S3_REGION:-}
      - LIVEKIT_EGRESS_RECORD_TRACKS=${LIVEKIT_EGRESS_RECORD_TRACKS:-false}
      # SMTP Configuration for email sending
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM_ADDRESS=${SMTP_FROM_ADDRESS:-noreply@localhost}
      - SMTP_FROM_NAME=${SMTP_FROM_NAME:-Recontext}
      # Portal URL for generating anonymous join links
      - PORTAL_URL=${PORTAL_URL:-http://localhost:20081}
      # Redis for Python transcription worker task queue
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_TASK_QUEUE=${REDIS_TASK_QUEUE:-recontext:transcription:queue}
      # Firebase Cloud Messaging for push notifications (JSON-string, optional)
      - FCM_CREDENTIALS_JSON=${FCM_CREDENTIALS_JSON:-}
      # LLM Configuration for memo generation (OpenAI-compatible API)
      - LLM_API_ENDPOINT=${LLM_API_ENDPOINT:-https://api.openai.com/v1}
      - LLM_MODEL=${LLM_MODEL:-gpt-4o-mini}
      - LLM_API_KEY=${LLM_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - recontext-network
    restart: unless-stopped

  # 3. PostgreSQL Database with pgvector extension
  postgres:
    image: pgvector/pgvector:pg16
    container_name: recontext-postgres
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      - POSTGRES_USER=${DB_USER:-recontext}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-recontext}
      - POSTGRES_DB=${DB_NAME:-recontext}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - recontext-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-recontext}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 4. RabbitMQ - Message Broker
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: recontext-rabbitmq
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MGMT_PORT:-15672}:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER:-recontext}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASSWORD:-recontext}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - recontext-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  # 5. Redis - Task queue for Python transcription worker
  redis:
    image: redis:7-alpine
    container_name: recontext-redis
    ports:
      - "${REDIS_PORT:-6380}:6379"
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis-data:/data
    networks:
      - recontext-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 6. Python Transcription Worker - Whisper + diarization + paragraph chunking
  transcription-worker-py:
    build:
      context: .
      dockerfile: deployments/docker/Dockerfile.transcription-worker-py
    container_name: recontext-transcription-worker-py
    environment:
      # Redis
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_TASK_QUEUE=${REDIS_TASK_QUEUE:-recontext:transcription:queue}
      - REDIS_RESULT_QUEUE=${REDIS_RESULT_QUEUE:-recontext:transcription:results}
      # MinIO
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
      - MINIO_BUCKET=${MINIO_BUCKET:-recontext}
      # Whisper (use 'medium' for better quality, 'base' for speed)
      - WHISPER_MODEL=${WHISPER_MODEL:-base}
      - WHISPER_DEVICE=${WHISPER_DEVICE:-cpu}
      - WHISPER_LANGUAGE=${WHISPER_LANGUAGE:-ru}
      # Diarization (set HuggingFace token to enable)
      - HF_TOKEN=${HF_TOKEN:-}
      - ENABLE_DIARIZATION=${ENABLE_DIARIZATION:-false}
      # Qdrant vector DB (optional)
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - QDRANT_ENABLED=${QDRANT_ENABLED:-false}
      # Audio
      - ENABLE_AUDIO_ENHANCEMENT=${ENABLE_AUDIO_ENHANCEMENT:-true}
      - MAX_PAUSE_SECONDS=${MAX_PAUSE_SECONDS:-1.5}
      - MAX_PARAGRAPH_CHARS=${MAX_PARAGRAPH_CHARS:-800}
      # Worker
      - WORKDIR=/tmp/recontext-worker
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - HEALTH_PORT=8085
    ports:
      - "8085:8085"
    volumes:
      - /tmp/recontext-worker:/tmp/recontext-worker
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - recontext-network
    restart: unless-stopped

  # 7. MinIO Storage
  minio:
    image: minio/minio:latest
    container_name: recontext-minio
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY:-minioadmin}
      - MINIO_PROMETHEUS_AUTH_TYPE=public
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    networks:
      - recontext-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 10s
      retries: 5

  # 8. Qdrant - Vector database for semantic search (optional)
  qdrant:
    image: qdrant/qdrant:latest
    container_name: recontext-qdrant
    ports:
      - "${QDRANT_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    networks:
      - recontext-network
    restart: unless-stopped

networks:
  recontext-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  minio-data:
  rabbitmq-data:
  qdrant-data:
  jitsi-recordings:
  prometheus-data:
  grafana-data:
  ollama-data:
  whisper-models:
