  models.ErrorResponse:
    properties:
      code:
        description: HTTP код ошибки
        type: integer
      error:
        description: Код ошибки
        type: string
      message:
        description: Сообщение об ошибке
        type: string
      timestamp:
        description: Время возникновения ошибки
        type: string
    type: object
  models.FileUploadResponse:
    properties:
      file_size:
        description: Размер файла в байтах
