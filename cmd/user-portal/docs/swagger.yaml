  models.ListFilesResponse:
    properties:
      files:
        description: Список файлов
        items:
          $ref: '#/definitions/models.UploadedFile'
        type: array
      page:
        description: Номер текущей страницы
        type: integer
      pageSize:
        description: Размер страницы
        type: integer
      total:
        description: Общее количество файлов
        type: integer
    type: object
  models.ListRecordingsResponse:
    properties:
      page:
        description: Номер текущей страницы
        type: integer
      page_size:
        description: Размер страницы
        type: integer
      recordings:
        description: Список записей
        items:
          $ref: '#/definitions/models.Recording'
        type: array
      total:
        description: Общее количество записей
        type: integer
    type: object
  models.LoginRequest:
    properties:
      password:
        description: Пароль пользователя
        example: password123
        type: string
      username:
        description: Имя пользователя или email для входа
        example: admin@recontext.online
        type: string
    required:
    - password
    - username
    type: object
  models.LoginResponse:
    properties:
      expires_at:
        description: Время истечения срока действия токена
        type: string
      token:
        description: JWT токен аутентификации
        example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        type: string
      user:
        allOf:
        - $ref: '#/definitions/models.UserInfo'
