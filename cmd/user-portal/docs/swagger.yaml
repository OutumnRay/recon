    x-enum-comments:
      MeetingRecurrenceDaily: Ежедневно
      MeetingRecurrenceMonthly: Ежемесячно
      MeetingRecurrenceNone: Не повторяется
      MeetingRecurrenceWeekly: Еженедельно
    x-enum-descriptions:
    - Не повторяется
    - Ежедневно
    - Еженедельно
    - Ежемесячно
    x-enum-varnames:
    - MeetingRecurrenceNone
    - MeetingRecurrenceDaily
    - MeetingRecurrenceWeekly
    - MeetingRecurrenceMonthly
  models.MeetingStatus:
