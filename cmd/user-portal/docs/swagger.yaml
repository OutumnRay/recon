      MeetingStatusCompleted: Завершена
      MeetingStatusInProgress: Идет
      MeetingStatusScheduled: Запланирована
    x-enum-descriptions:
    - Запланирована
    - Идет
    - Завершена
    - Отменена
    x-enum-varnames:
    - MeetingStatusScheduled
    - MeetingStatusInProgress
